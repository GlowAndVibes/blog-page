<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Blog</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; padding: 40px 20px; background: #ffffff; color: #222222; text-align: center; }
        h1 { font-size: 26px; font-weight: 600; }
        p { color: #666666; font-size: 16px; line-height: 1.5; }
        
        /* СТИЛИ ГРАДИЕНТНОЙ КНОПКИ */
        .btn { 
            display: inline-block; 
            background: linear-gradient(45deg, #7f00ff, #ff007f); /* Фиолетово-розовый градиент */
            color: #ffffff; 
            padding: 18px 45px; 
            margin-top: 40px; 
            text-decoration: none; 
            border-radius: 50px; /* Полностью круглые бока кнопки */
            font-weight: bold; 
            font-size: 18px; 
            box-shadow: 0 5px 20px rgba(255, 0, 127, 0.4); /* Неоновое свечение/тень */
            transition: transform 0.2s; 
        }
        .btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <h1>Lifestyle & Travel Notes</h1>
    <p>Welcome to my personal space. Here I share my thoughts, mobile photography tips, behind-the-scenes moments, and inspiration from my everyday life.</p>
    <p style="margin-top: 50px; color: #444;">Please verify your age to enter the gallery:</p>
    
    <a href="https://sites.google.com/view/glowandwibes--/" class="btn">I am 18 or older ➔</a>
</body>
</html>
