<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Blog</title>
    <style>
        body { font-family: "Georgia", serif; padding: 40px 20px; background: #ffffff; color: #222222; text-align: center; }
        h1 { font-size: 28px; font-weight: normal; font-style: italic; }
        p { color: #777777; font-size: 15px; line-height: 1.6; }
        
        /* СТИЛИ ПРОЗРАЧНОЙ КНОПКИ С РАМКОЙ */
        .btn { 
            display: inline-block; 
            background: transparent; /* Прозрачный фон */
            color: #000000; /* Черный цвет текста */
            border: 2px solid #000000; /* Черная рамка толщиной 2 пикселя */
            padding: 15px 45px; 
            margin-top: 40px; 
            text-decoration: none; 
            border-radius: 0px; /* Полностью острые углы */
            font-family: sans-serif;
            font-weight: 500; 
            font-size: 15px; 
            letter-spacing: 2px; /* Расстояние между буквами */
            transition: all 0.2s; 
        }
        .btn:active { background: #000000; color: #ffffff; } /* При нажатии кнопка окрасится в черный */
    </style>
</head>
<body>
    <h1>Lifestyle & Travel Notes</h1>
    <p>Welcome to my personal space. Here I share my thoughts, mobile photography tips, behind-the-scenes moments, and inspiration from my everyday life.</p>
    <p style="margin-top: 50px; color: #444;">Please verify your age to enter the gallery:</p>
    
    <a href="https://sites.google.com/view/glowandwibes--/" class="btn">ENTER 18+</a>
</body>
</html>
